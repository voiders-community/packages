name: Build
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [srcpkgs/**]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { arch: x86_64,      libc: glibc, platform: linux/amd64  }
          - { arch: x86_64-musl, libc: musl,  platform: linux/amd64  }
    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250616R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes: [/dev:/dev]
      env:
        XBPS_TARGET_ARCH: "${{ matrix.config.arch }}"
        XBPS_CHROOT_CMD: uchroot
    steps:
      - name: prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder
          su builder
      - name: git clone
        run: |
          git clone --recurse-submodules --shallow-submodules https://github.com/${{github.repository}} /tmp/repo
          chown -R builder:builder /tmp/repo
      - name: build ${{ matrix.arch }}
        run: |
          cd /tmp/repo
          sudo -Eu builder ./make bootstrap
          sudo -Eu builder ./make build bibata-modern-ice
