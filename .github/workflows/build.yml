name: Build
on:
  workflow_dispatch:
    inputs:
      arch:
        description: The arch to build the template for
        required: true
        type: string
      template:
        description: The template name to build
        required: true
        type: string
      version:
        description: The template's version
        required: true
        type: string
      revision:
        description: The template's revision
        required: true
        type: string
  push:
    branches: [master]
    paths: [srcpkgs/**]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.arch }}-${{ inputs.template}}@${{ inputs.version }}-${{ inputs.revision }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      XBPS_TARGET_ARCH: ${{ inputs.arch }}
      BINPKG_NAME: ${{ inputs.template }}-${{ inputs.version }}_${{ inputs.revision }}.${{ inputs.arch }}.xbps
    steps:
      - name: get xbps static
        run: |
          curl -o /tmp/xbps.tar.xz -fLO https://repo-default.voidlinux.org/static/xbps-static-static-0.60.4_1.x86_64-musl.tar.xz
          sudo tar xvf /tmp/xbps.tar.xz -C / 
      - name: checkout voiders-community/packages
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: build ${{ env.BINPKG_NAME }}
        run: |
          echo XBPS_CHROOT_CMD=ethereal >> ./void-packages/etc/conf
          echo XBPS_ALLOW_CHROOT_BREAKOUT=yes >> ./void-packages/etc/conf
          ln -s / void-packages/masterdir
          ./make bootstrap
          ./make build ${{ inputs.template }}
      - name: publish ${{ env.BINPKG_NAME }}
        uses: EndBug/add-and-commit@v9
        with:
          add: ./hostdir/binpkgs/${{ env.BINPKG_NAME }}
          author_name: Voiders Community
          message: "[ci] add ${{ env.BINPKG_NAME }}"
          pull: --rebase --autostash
          push: true
