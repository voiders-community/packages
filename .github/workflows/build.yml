name: Build
on: [push, workflow_dispatch]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - name: get xbps static
        run: |
          curl -o /tmp/xbps.tar.xz -fLO https://repo-default.voidlinux.org/static/xbps-static-static-0.60.4_1.x86_64-musl.tar.xz
          tar xvf /tmp/xbps.tar.xz
          ls -lha /tmp/xbps.tar.xz
